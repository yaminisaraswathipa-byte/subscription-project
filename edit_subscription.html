<!DOCTYPE html>
<html>
<head>
    <title>Edit Subscription</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h2>Edit Subscription</h2>

    <form method="POST">
        <label>Subscription Name:</label>
        <input type="text" name="subscription_name" value="{{ subscription[2] }}">

        <label>Category:</label>
        <input type="text" name="category" value="{{ subscription[3] }}">

        <label>Price:</label>
        <input type="number" step="0.01" name="price" value="{{ subscription[4] }}">

        <label>Billing Cycle:</label>
        <select name="billing_cycle">
            <option value="Monthly" {% if subscription[5] == 'Monthly' %}selected{% endif %}>Monthly</option>
            <option value="Yearly" {% if subscription[5] == 'Yearly' %}selected{% endif %}>Yearly</option>
        </select>

        <label>Start Date:</label>
        <input type="date" name="start_date" value="{{ subscription[6] }}">

        <label>Renewal Date:</label>
        <input type="date" name="renewal_date" value="{{ subscription[7] }}">

        <button type="submit">Update Subscription</button>
    </form>

    <a href="/dashboard">Back to Dashboard</a>
</div>
</body>
</html>
